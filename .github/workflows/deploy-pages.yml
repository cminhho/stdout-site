# Deploy to GitHub Pages on version tag (e.g. v1.0.0).
# Pushes dist/ to branch gh-pages — no environment or protection rules needed.
# One-time: Settings → Pages → Source: Deploy from a branch → branch gh-pages, folder / (root).
#
# Flow: release.sh pulls latest main, bumps version, tags that commit, pushes. This job runs on
# the tag push and checks out the tagged commit (= latest main at release time), then build + deploy.

name: Deploy to GitHub Pages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
